# Fly.io transcoding worker — deploy from repo root:
#   fly launch --config fly.worker.toml --no-deploy
#   fly secrets set DATABASE_URL=... REDIS_URL=... (see DEPLOY.md)
#   fly deploy --config fly.worker.toml

app = "framevid-worker"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.worker"

[env]
  NODE_ENV = "production"

# Dedicated high-performance instance for rapid multi-threaded FFmpeg encoding
[[vm]]
  size = "performance-4x"
  memory = "4096mb"
