# Fly.io transcoding worker — deploy from repo root:
#   fly launch --config fly.worker.toml --no-deploy
#   fly secrets set DATABASE_URL=... REDIS_URL=... (see DEPLOY.md)
#   fly deploy --config fly.worker.toml

app = "framevid-worker"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.worker"

[env]
  NODE_ENV = "production"

# Smallest practical size for FFmpeg (raise if transcodes OOM).
[[vm]]
  size = "shared-cpu-2x"
  memory = "2048mb"
