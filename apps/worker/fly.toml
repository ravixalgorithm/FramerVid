# Fly.io — FrameVid transcoding worker
# Deploy: fly deploy --config apps/worker/fly.toml (from repo root, see DEPLOY.md)

app = "framevid-worker"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
  build-target = ""

[env]
  NODE_ENV = "production"

[processes]
  worker = "node dist/processor.js"

[[vm]]
  size = "performance-4x"
  memory = "8192mb"
  cpus = 4

[checks]
  [checks.worker]
    type = "process"
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
