# Shared Nixpacks config when Railway builds from the monorepo root.
# FFmpeg is required on the worker service; harmless on the dashboard service.
[phases.setup]
nixPkgs = ['nodejs_20', 'ffmpeg']

[phases.install]
cmds = [
  'npm install -g corepack@0.24.0 && corepack enable',
  'pnpm install --frozen-lockfile',
]
