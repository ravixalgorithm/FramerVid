version: '3.8'

services:
  # 1. Local PostgreSQL Database Container (Port 5432)
  postgres:
    image: postgres:15-alpine
    container_name: framevid-postgres
    restart: always
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: framevid
    volumes:
      - pgdata:/var/lib/postgresql/data

  # 2. Local Redis Cache Container (Port 6379 for BullMQ transcoding queue)
  redis:
    image: redis:7-alpine
    container_name: framevid-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
